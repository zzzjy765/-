<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代理业绩排行榜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* 头部 */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #ffd700, #ff6b6b, #c44569);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .header p {
      color: #a0a0a0;
      font-size: 1rem;
    }

    .update-time {
      color: #666;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    /* 切换标签 */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      color: #a0a0a0;
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .tab.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    /* 统计卡片 */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-card .icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 5px;
    }

    .stat-card .label {
      color: #a0a0a0;
      font-size: 0.85rem;
    }

    /* 排行榜列表 */
    .rank-list {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .rank-header {
      display: grid;
      grid-template-columns: 80px 1fr 140px 100px;
      padding: 15px 20px;
      font-weight: 600;
      color: #a0a0a0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.9rem;
    }

    .rank-item {
      display: grid;
      grid-template-columns: 80px 1fr 140px 100px;
      padding: 18px 20px;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .rank-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      transform: scale(1.01);
    }

    .rank-item:last-child {
      border-bottom: none;
    }

    /* 排名样式 */
    .rank-num {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rank-badge {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .rank-badge.gold {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a2e;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    .rank-badge.silver {
      background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
      color: #1a1a2e;
    }

    .rank-badge.bronze {
      background: linear-gradient(135deg, #cd7f32, #b8860b);
      color: #1a1a2e;
    }

    .rank-badge.normal {
      background: rgba(255, 255, 255, 0.1);
      color: #a0a0a0;
    }

    /* 代理信息 */
    .agent-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .agent-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .agent-detail h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .agent-detail .team-tag {
      display: inline-block;
      background: rgba(102, 126, 234, 0.3);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: #a0a0a0;
    }

    /* 销售额 */
    .sales-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffd700;
    }

    /* 排名变化 */
    .rank-change {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .rank-change.up {
      color: #4ade80;
    }

    .rank-change.down {
      color: #f87171;
    }

    .rank-change.same {
      color: #a0a0a0;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .rank-header {
        display: none;
      }

      .rank-item {
        grid-template-columns: 60px 1fr;
        grid-template-rows: auto auto;
        gap: 10px;
        padding: 15px;
      }

      .agent-info {
        grid-column: 2;
      }

      .sales-value, .rank-change {
        grid-column: 2;
        justify-content: flex-start;
      }

      .rank-num {
        grid-row: span 2;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* 动画 */
    .rank-item {
      animation: fadeIn 0.5s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .rank-item:nth-child(1) { animation-delay: 0.05s; }
    .rank-item:nth-child(2) { animation-delay: 0.1s; }
    .rank-item:nth-child(3) { animation-delay: 0.15s; }
    .rank-item:nth-child(4) { animation-delay: 0.2s; }
    .rank-item:nth-child(5) { animation-delay: 0.25s; }
    .rank-item:nth-child(6) { animation-delay: 0.3s; }
    .rank-item:nth-child(7) { animation-delay: 0.35s; }
    .rank-item:nth-child(8) { animation-delay: 0.4s; }
    .rank-item:nth-child(9) { animation-delay: 0.45s; }
    .rank-item:nth-child(10) { animation-delay: 0.5s; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <h1>🏆 代理业绩排行榜</h1>
      <p>公平竞争 · 实至名归 · 荣耀加冕</p>
      <div class="update-time">更新时间：<span id="updateTime"></span></div>
    </div>

    <!-- 切换标签 -->
    <div class="tabs">
      <button class="tab active" data-tab="daily">📅 日榜</button>
      <button class="tab" data-tab="monthly">📆 月榜</button>
      <button class="tab" data-tab="yearly">📊 年榜</button>
      <button class="tab" data-tab="total">🏅 累计榜</button>
    </div>

    <!-- 统计卡片 -->
    <div class="stats">
      <div class="stat-card">
        <div class="icon">💰</div>
        <div class="value" id="totalSales">¥287万</div>
        <div class="label">总销售额</div>
      </div>
      <div class="stat-card">
        <div class="icon">📦</div>
        <div class="value" id="totalOrders">1,286</div>
        <div class="label">总订单数</div>
      </div>
      <div class="stat-card">
        <div class="icon">👥</div>
        <div class="value" id="totalAgents">128</div>
        <div class="label">代理人数</div>
      </div>
      <div class="stat-card">
        <div class="icon">🎯</div>
        <div class="value" id="topAgent">张伟</div>
        <div class="label">榜首代理</div>
      </div>
    </div>

    <!-- 排行榜 -->
    <div class="rank-list">
      <div class="rank-header">
        <div>排名</div>
        <div>代理</div>
        <div>销售额</div>
        <div>排名变化</div>
      </div>
      <div id="rankContent">
        <!-- 动态内容 -->
      </div>
    </div>
  </div>

  <script>
    // 数据源 - 代理数据
    const data = {
      daily: {
        totalSales: '¥28.6万',
        totalOrders: '386',
        totalAgents: '128',
        topAgent: '李明',
        items: [
          { rank: 1, name: '李明', team: '华东战队', sales: '3.8万', change: 2 },
          { rank: 2, name: '王芳', team: '华南战队', sales: '3.5万', change: 0 },
          { rank: 3, name: '张伟', team: '华北大区', sales: '3.2万', change: -1 },
          { rank: 4, name: '赵丽', team: '西南战队', sales: '2.9万', change: 3 },
          { rank: 5, name: '刘洋', team: '华东战队', sales: '2.6万', change: -2 },
          { rank: 6, name: '陈静', team: '华中战队', sales: '2.4万', change: 1 },
          { rank: 7, name: '杨帆', team: '华南战队', sales: '2.2万', change: 0 },
          { rank: 8, name: '周涛', team: '华北大区', sales: '2.0万', change: -1 },
          { rank: 9, name: '吴月', team: '西北战队', sales: '1.8万', change: 5 },
          { rank: 10, name: '郑鑫', team: '东北战队', sales: '1.6万', change: 2 },
        ]
      },
      monthly: {
        totalSales: '¥287万',
        totalOrders: '1,286',
        totalAgents: '128',
        topAgent: '王芳',
        items: [
          { rank: 1, name: '王芳', team: '华南战队', sales: '48.6万', change: 0 },
          { rank: 2, name: '张伟', team: '华北大区', sales: '45.2万', change: 1 },
          { rank: 3, name: '李明', team: '华东战队', sales: '42.8万', change: -1 },
          { rank: 4, name: '刘洋', team: '华东战队', sales: '38.5万', change: 2 },
          { rank: 5, name: '赵丽', team: '西南战队', sales: '35.2万', change: -1 },
          { rank: 6, name: '陈静', team: '华中战队', sales: '32.8万', change: 0 },
          { rank: 7, name: '杨帆', team: '华南战队', sales: '28.6万', change: 3 },
          { rank: 8, name: '周涛', team: '华北大区', sales: '25.4万', change: -2 },
          { rank: 9, name: '吴月', team: '西北战队', sales: '22.8万', change: 1 },
          { rank: 10, name: '郑鑫', team: '东北战队', sales: '18.6万', change: -1 },
        ]
      },
      yearly: {
        totalSales: '¥2,186万',
        totalOrders: '8,526',
        totalAgents: '128',
        topAgent: '王芳',
        items: [
          { rank: 1, name: '王芳', team: '华南战队', sales: '486万', change: 0 },
          { rank: 2, name: '张伟', team: '华北大区', sales: '428万', change: 0 },
          { rank: 3, name: '李明', team: '华东战队', sales: '386万', change: 2 },
          { rank: 4, name: '刘洋', team: '华东战队', sales: '356万', change: -1 },
          { rank: 5, name: '赵丽', team: '西南战队', sales: '328万', change: 1 },
          { rank: 6, name: '陈静', team: '华中战队', sales: '298万', change: -2 },
          { rank: 7, name: '杨帆', team: '华南战队', sales: '268万', change: 0 },
          { rank: 8, name: '周涛', team: '华北大区', sales: '238万', change: 3 },
          { rank: 9, name: '吴月', team: '西北战队', sales: '198万', change: 1 },
          { rank: 10, name: '郑鑫', team: '东北战队', sales: '168万', change: -1 },
        ]
      },
      total: {
        totalSales: '¥8,860万',
        totalOrders: '42,856',
        totalAgents: '128',
        topAgent: '王芳',
        items: [
          { rank: 1, name: '王芳', team: '华南战队', sales: '1,286万', change: 0 },
          { rank: 2, name: '张伟', team: '华北大区', sales: '1,158万', change: 0 },
          { rank: 3, name: '李明', team: '华东战队', sales: '986万', change: 0 },
          { rank: 4, name: '刘洋', team: '华东战队', sales: '856万', change: 0 },
          { rank: 5, name: '赵丽', team: '西南战队', sales: '728万', change: 0 },
          { rank: 6, name: '陈静', team: '华中战队', sales: '658万', change: 0 },
          { rank: 7, name: '杨帆', team: '华南战队', sales: '586万', change: 0 },
          { rank: 8, name: '周涛', team: '华北大区', sales: '498万', change: 0 },
          { rank: 9, name: '吴月', team: '西北战队', sales: '428万', change: 0 },
          { rank: 10, name: '郑鑫', team: '东北战队', sales: '368万', change: 0 },
        ]
      }
    };

    // 设置更新时间
    function updateDateTime() {
      const now = new Date();
      const options = { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      };
      document.getElementById('updateTime').textContent = now.toLocaleString('zh-CN', options);
    }
    updateDateTime();

    // 获取排名徽章类名
    function getRankClass(rank) {
      if (rank === 1) return 'gold';
      if (rank === 2) return 'silver';
      if (rank === 3) return 'bronze';
      return 'normal';
    }

    // 获取排名变化HTML
    function getChangeHTML(change) {
      if (change > 0) {
        return `<span class="rank-change up">↑ +${change}</span>`;
      } else if (change < 0) {
        return `<span class="rank-change down">↓ ${change}</span>`;
      } else {
        return `<span class="rank-change same">— 持平</span>`;
      }
    }

    // 获取代理姓名首字
    function getInitial(name) {
      return name.charAt(0);
    }

    // 渲染排行榜
    function renderRankList(tab) {
      const content = document.getElementById('rankContent');
      const info = data[tab];

      // 更新统计
      document.getElementById('totalSales').textContent = info.totalSales;
      document.getElementById('totalOrders').textContent = info.totalOrders;
      document.getElementById('totalAgents').textContent = info.totalAgents;
      document.getElementById('topAgent').textContent = info.topAgent;

      // 渲染列表
      let html = '';
      info.items.forEach(item => {
        html += `
          <div class="rank-item">
            <div class="rank-num">
              <div class="rank-badge ${getRankClass(item.rank)}">${item.rank}</div>
            </div>
            <div class="agent-info">
              <div class="agent-avatar">${getInitial(item.name)}</div>
              <div class="agent-detail">
                <h3>${item.name}</h3>
                <span class="team-tag">${item.team}</span>
              </div>
            </div>
            <div class="sales-value">¥${item.sales}</div>
            ${getChangeHTML(item.change)}
          </div>
        `;
      });

      content.innerHTML = html;
    }

    // 标签切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // 移除所有active
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        // 添加active
        tab.classList.add('active');
        // 渲染数据
        renderRankList(tab.dataset.tab);
      });
    });

    // 初始加载
    renderRankList('daily');
  </script>
</body>
</html>
